<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <!-- WOOD GRAIN TEXTURE PATTERN -->
    <pattern id="wood-grain" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="#7c4a2d"/>
      <line x1="0" y1="0" x2="100" y2="0" stroke="#6b3d26" stroke-width="0.5" opacity="0.3"/>
      <line x1="0" y1="5" x2="100" y2="5" stroke="#8b5a3c" stroke-width="0.3" opacity="0.2"/>
      <line x1="0" y1="12" x2="100" y2="12" stroke="#5a3220" stroke-width="0.4" opacity="0.4"/>
      <line x1="0" y1="20" x2="100" y2="20" stroke="#6b3d26" stroke-width="0.3" opacity="0.25"/>
      <line x1="0" y1="28" x2="100" y2="28" stroke="#8b5a3c" stroke-width="0.5" opacity="0.15"/>
      <line x1="0" y1="35" x2="100" y2="35" stroke="#5a3220" stroke-width="0.4" opacity="0.3"/>
      <line x1="0" y1="45" x2="100" y2="45" stroke="#6b3d26" stroke-width="0.3" opacity="0.2"/>
      <line x1="0" y1="55" x2="100" y2="55" stroke="#8b5a3c" stroke-width="0.4" opacity="0.25"/>
      <line x1="0" y1="65" x2="100" y2="65" stroke="#5a3220" stroke-width="0.5" opacity="0.35"/>
      <line x1="0" y1="75" x2="100" y2="75" stroke="#6b3d26" stroke-width="0.3" opacity="0.2"/>
      <line x1="0" y1="85" x2="100" y2="85" stroke="#8b5a3c" stroke-width="0.4" opacity="0.25"/>
      <line x1="0" y1="95" x2="100" y2="95" stroke="#5a3220" stroke-width="0.3" opacity="0.3"/>
    </pattern>

    <!-- RADIAL GRADIENT - AMBER GLOW -->
    <radialGradient id="amber-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.6" />
      <stop offset="70%" style="stop-color:#d97706;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0" />
    </radialGradient>

    <!-- LINEAR GRADIENT - HEXAGON DEFAULT -->
    <linearGradient id="hex-default" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5a3c;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6b4423;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a2f1a;stop-opacity:1" />
    </linearGradient>

    <!-- LINEAR GRADIENT - HEXAGON HOVER (AMBER) -->
    <linearGradient id="hex-amber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d97706;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b45309;stop-opacity:1" />
    </linearGradient>

    <!-- LINEAR GRADIENT - HEXAGON GREEN (CORRECT) -->
    <linearGradient id="hex-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>

    <!-- LINEAR GRADIENT - HEXAGON RED (WRONG) -->
    <linearGradient id="hex-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#b91c1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7f1d1d;stop-opacity:1" />
    </linearGradient>

    <!-- FILTER - DROP SHADOW -->
    <filter id="drop-shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.6"/>
    </filter>

    <!-- FILTER - GLOW -->
    <filter id="glow-effect">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .hex-path { fill-rule: evenodd; }
    </style>
  </defs>

  <!-- ========== SECTION 1: BASE HEXAGON SHAPE ========== -->
  <g id="global-001-hexagon-base">
    <title>Base Hexagon Shape - Reusable for all hex-based components</title>
    <polygon points="50,0 100,25 100,75 50,100 0,75 0,25"
             class="hex-path"
             fill="none"
             stroke="#f59e0b"
             stroke-width="2"/>
  </g>

  <!-- ========== SECTION 2: HEXAGON BUTTON STATES ========== -->

  <!-- HEX-001: DEFAULT STATE -->
  <g id="hex-001-default" transform="translate(50, 50)">
    <title>Hexagon Button - Default State</title>
    <defs>
      <filter id="hex-default-shadow">
        <feDropShadow dx="0" dy="4" stdDeviation="3" flood-opacity="0.5"/>
      </filter>
    </defs>
    <polygon points="50,5 95,30 95,80 50,105 5,80 5,30"
             fill="url(#hex-default)"
             stroke="#4a2815"
             stroke-width="3"
             filter="url(#hex-default-shadow)"/>
    <text x="50" y="60" font-size="32" font-weight="900" text-anchor="middle" fill="#f59e0b" font-family="Fredoka One">A</text>
  </g>

  <!-- HEX-002: HOVER STATE -->
  <g id="hex-002-hover" transform="translate(200, 50)">
    <title>Hexagon Button - Hover State with Amber Glow</title>
    <defs>
      <filter id="hex-hover-glow">
        <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#f59e0b" flood-opacity="0.7"/>
      </filter>
    </defs>
    <polygon points="50,5 95,30 95,80 50,105 5,80 5,30"
             fill="url(#hex-amber)"
             stroke="#d97706"
             stroke-width="3"
             filter="url(#hex-hover-glow)"/>
    <text x="50" y="60" font-size="32" font-weight="900" text-anchor="middle" fill="#fff" font-family="Fredoka One">B</text>
  </g>

  <!-- HEX-003: PRESSED STATE -->
  <g id="hex-003-pressed" transform="translate(350, 50)">
    <title>Hexagon Button - Pressed State</title>
    <defs>
      <filter id="hex-pressed-shadow">
        <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.6"/>
      </filter>
    </defs>
    <!-- Outer darker layer for inset effect -->
    <polygon points="50,5 95,30 95,80 50,105 5,80 5,30"
             fill="#4a2f1a"
             stroke="#2a1810"
             stroke-width="2"/>
    <!-- Inner lighter layer -->
    <polygon points="55,12 88,32 88,75 50,97 12,75 12,32"
             fill="url(#hex-default)"
             stroke="#5a3220"
             stroke-width="2"
             filter="url(#hex-pressed-shadow)"/>
    <text x="50" y="60" font-size="32" font-weight="900" text-anchor="middle" fill="#f59e0b" font-family="Fredoka One">C</text>
  </g>

  <!-- HEX-004: CORRECT STATE (GREEN) -->
  <g id="hex-004-correct" transform="translate(500, 50)">
    <title>Hexagon Button - Correct Answer State</title>
    <defs>
      <filter id="hex-correct-glow">
        <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#10b981" flood-opacity="0.8"/>
      </filter>
    </defs>
    <polygon points="50,5 95,30 95,80 50,105 5,80 5,30"
             fill="url(#hex-green)"
             stroke="#059669"
             stroke-width="3"
             filter="url(#hex-correct-glow)"/>
    <text x="50" y="60" font-size="32" font-weight="900" text-anchor="middle" fill="#fff" font-family="Fredoka One">✓</text>
  </g>

  <!-- HEX-005: WRONG STATE (RED) -->
  <g id="hex-005-wrong" transform="translate(650, 50)">
    <title>Hexagon Button - Wrong Answer State</title>
    <defs>
      <filter id="hex-wrong-glow">
        <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#dc2626" flood-opacity="0.8"/>
      </filter>
    </defs>
    <polygon points="50,5 95,30 95,80 50,105 5,80 5,30"
             fill="url(#hex-red)"
             stroke="#b91c1c"
             stroke-width="3"
             filter="url(#hex-wrong-glow)"/>
    <text x="50" y="60" font-size="32" font-weight="900" text-anchor="middle" fill="#fff" font-family="Fredoka One">✕</text>
  </g>

  <!-- ========== SECTION 3: NAVIGATION ICONS ========== -->

  <!-- NAV-001: HOME ICON -->
  <g id="nav-icon-home" transform="translate(50, 200)">
    <title>Navigation Icon - Home</title>
    <rect x="10" y="35" width="80" height="55" fill="none" stroke="#f59e0b" stroke-width="3" rx="4"/>
    <polygon points="50,10 90,35 90,90 10,90 10,35" fill="none" stroke="#f59e0b" stroke-width="3"/>
    <line x1="50" y1="35" x2="50" y2="80" stroke="#f59e0b" stroke-width="2"/>
  </g>

  <!-- NAV-002: PLAY ICON -->
  <g id="nav-icon-play" transform="translate(200, 200)">
    <title>Navigation Icon - Play</title>
    <circle cx="50" cy="50" r="45" fill="none" stroke="#f59e0b" stroke-width="3"/>
    <polygon points="35,25 35,75 75,50" fill="#f59e0b"/>
  </g>

  <!-- NAV-003: PROFILE ICON -->
  <g id="nav-icon-profile" transform="translate(350, 200)">
    <title>Navigation Icon - Profile</title>
    <circle cx="50" cy="28" r="18" fill="none" stroke="#f59e0b" stroke-width="3"/>
    <path d="M 20 60 Q 20 45 50 45 Q 80 45 80 60 L 80 75 Q 80 75 50 75 Q 20 75 20 75 Z"
          fill="none" stroke="#f59e0b" stroke-width="3"/>
  </g>

  <!-- NAV-004: SHOP ICON -->
  <g id="nav-icon-shop" transform="translate(500, 200)">
    <title>Navigation Icon - Shop</title>
    <path d="M 20 30 L 30 10 L 70 10 L 80 30 Z" fill="none" stroke="#f59e0b" stroke-width="3"/>
    <rect x="15" y="30" width="70" height="50" fill="none" stroke="#f59e0b" stroke-width="3" rx="4"/>
    <line x1="30" y1="30" x2="30" y2="80" stroke="#f59e0b" stroke-width="2"/>
    <line x1="50" y1="30" x2="50" y2="80" stroke="#f59e0b" stroke-width="2"/>
    <line x1="70" y1="30" x2="70" y2="80" stroke="#f59e0b" stroke-width="2"/>
  </g>

  <!-- NAV-005: LEADERBOARD ICON -->
  <g id="nav-icon-leaderboard" transform="translate(650, 200)">
    <title>Navigation Icon - Leaderboard</title>
    <rect x="15" y="50" width="20" height="30" fill="#f59e0b" stroke="#f59e0b" stroke-width="2"/>
    <rect x="40" y="35" width="20" height="45" fill="#f59e0b" stroke="#f59e0b" stroke-width="2"/>
    <rect x="65" y="20" width="20" height="60" fill="#f59e0b" stroke="#f59e0b" stroke-width="2"/>
    <line x1="10" y1="82" x2="90" y2="82" stroke="#f59e0b" stroke-width="2"/>
  </g>

  <!-- NAV-006: SETTINGS ICON -->
  <g id="nav-icon-settings" transform="translate(800, 200)">
    <title>Navigation Icon - Settings</title>
    <circle cx="50" cy="50" r="15" fill="none" stroke="#f59e0b" stroke-width="3"/>
    <g stroke="#f59e0b" stroke-width="3" fill="none">
      <line x1="50" y1="10" x2="50" y2="25"/>
      <line x1="50" y1="75" x2="50" y2="90"/>
      <line x1="10" y1="50" x2="25" y2="50"/>
      <line x1="75" y1="50" x2="90" y2="50"/>
      <line x1="18" y1="18" x2="30" y2="30"/>
      <line x1="70" y1="70" x2="82" y2="82"/>
      <line x1="82" y1="18" x2="70" y2="30"/>
      <line x1="30" y1="70" x2="18" y2="82"/>
    </g>
  </g>

  <!-- ========== SECTION 4: DECORATIVE ELEMENTS ========== -->

  <!-- GLOBAL-004: LEAF DECORATION -->
  <g id="global-004-leaf" transform="translate(50, 400)">
    <title>Leaf Decoration - Reusable corner accent</title>
    <path d="M 20 10 Q 30 5 35 20 Q 30 35 15 40 Q 18 25 20 10"
          fill="#10b981"
          stroke="#047857"
          stroke-width="1.5"/>
    <path d="M 20 15 Q 20 20 20 35"
          stroke="#047857"
          stroke-width="1"
          fill="none"/>
  </g>

  <!-- LEAF ROTATION VARIANTS -->
  <g id="global-004-leaf-90" transform="translate(150, 400) rotate(90 25 25)">
    <use href="#global-004-leaf"/>
  </g>

  <g id="global-004-leaf-180" transform="translate(250, 400) rotate(180 25 25)">
    <use href="#global-004-leaf"/>
  </g>

  <g id="global-004-leaf-270" transform="translate(350, 400) rotate(270 25 25)">
    <use href="#global-004-leaf"/>
  </g>

  <!-- ========== SECTION 5: GLOBAL GRADIENTS & TEXTURES ========== -->

  <!-- WOOD GRAIN EXAMPLE -->
  <g id="global-002-wood-grain-sample" transform="translate(50, 500)">
    <title>Wood Grain Texture Pattern - Tileable background</title>
    <rect x="0" y="0" width="150" height="80" fill="url(#wood-grain)" stroke="#4a2815" stroke-width="2"/>
    <text x="75" y="50" font-size="12" text-anchor="middle" fill="#f59e0b" font-weight="bold">Wood Texture</text>
  </g>

  <!-- AMBER GLOW EXAMPLE -->
  <g id="global-003-amber-glow-sample" transform="translate(250, 500)">
    <title>Amber Glow Halo - Reusable radial gradient</title>
    <circle cx="75" cy="40" r="60" fill="url(#amber-glow)"/>
    <circle cx="75" cy="40" r="30" fill="#f59e0b" stroke="#d97706" stroke-width="2"/>
    <text x="75" y="48" font-size="12" text-anchor="middle" fill="#1a1008" font-weight="bold">Glow</text>
  </g>

  <!-- ========== SECTION 6: HONEYCOMB CELLS ========== -->

  <!-- Single Honeycomb Cell - Empty -->
  <g id="honeycomb-empty" transform="translate(50, 600)">
    <title>Honeycomb Cell - Empty</title>
    <polygon points="40,5 70,20 70,50 40,65 10,50 10,20"
             fill="none"
             stroke="#8b5a3c"
             stroke-width="2"/>
  </g>

  <!-- Single Honeycomb Cell - Filled -->
  <g id="honeycomb-filled" transform="translate(150, 600)">
    <title>Honeycomb Cell - Filled with Honey</title>
    <polygon points="40,5 70,20 70,50 40,65 10,50 10,20"
             fill="#f59e0b"
             stroke="#d97706"
             stroke-width="2"/>
    <!-- Honey shine effect -->
    <ellipse cx="40" cy="28" rx="12" ry="8" fill="#fbbf24" opacity="0.6"/>
  </g>

  <!-- Honeycomb Cluster (3x3) -->
  <g id="honeycomb-cluster-3x3" transform="translate(280, 570)">
    <title>Honeycomb Cluster - 3x3 Grid</title>

    <!-- Row 1 -->
    <polygon points="30,10 50,20 50,40 30,50 10,40 10,20" fill="#f59e0b" stroke="#d97706" stroke-width="1.5"/>
    <polygon points="70,10 90,20 90,40 70,50 50,40 50,20" fill="#f59e0b" stroke="#d97706" stroke-width="1.5"/>
    <polygon points="110,10 130,20 130,40 110,50 90,40 90,20" fill="#f59e0b" stroke="#d97706" stroke-width="1.5"/>

    <!-- Row 2 -->
    <polygon points="30,55 50,65 50,85 30,95 10,85 10,65" fill="none" stroke="#8b5a3c" stroke-width="1.5"/>
    <polygon points="70,55 90,65 90,85 70,95 50,85 50,65" fill="#f59e0b" stroke="#d97706" stroke-width="1.5"/>
    <polygon points="110,55 130,65 130,85 110,95 90,85 90,65" fill="#f59e0b" stroke="#d97706" stroke-width="1.5"/>

    <!-- Row 3 -->
    <polygon points="30,100 50,110 50,130 30,140 10,130 10,110" fill="none" stroke="#8b5a3c" stroke-width="1.5"/>
    <polygon points="70,100 90,110 90,130 70,140 50,130 50,110" fill="none" stroke="#8b5a3c" stroke-width="1.5"/>
    <polygon points="110,100 130,110 130,130 110,140 90,130 90,110" fill="#f59e0b" stroke="#d97706" stroke-width="1.5"/>
  </g>

  <!-- ========== SECTION 7: PROGRESS BARS ========== -->

  <!-- Progress Cell - 4 States -->
  <g id="progress-cells" transform="translate(50, 720)">
    <title>Progress Cells - 4 states for animation</title>

    <!-- Empty -->
    <polygon points="30,10 50,20 50,40 30,50 10,40 10,20"
             fill="none"
             stroke="#8b5a3c"
             stroke-width="2"/>
    <text x="30" y="35" font-size="10" text-anchor="middle" fill="#f59e0b">0%</text>

    <!-- 25% -->
    <polygon points="80,10 100,20 100,40 80,50 60,40 60,20"
             fill="#f59e0b"
             stroke="#d97706"
             stroke-width="2"/>
    <path d="M 70 35 L 90 25" stroke="#d97706" stroke-width="1" fill="none" opacity="0.5"/>
    <text x="80" y="35" font-size="10" text-anchor="middle" fill="#1a1008" font-weight="bold">25%</text>

    <!-- 50% -->
    <polygon points="130,10 150,20 150,40 130,50 110,40 110,20"
             fill="#f59e0b"
             stroke="#d97706"
             stroke-width="2"/>
    <path d="M 120 20 L 140 20 L 140 40 L 120 40 Z" stroke="#d97706" stroke-width="1" fill="none" opacity="0.5"/>
    <text x="130" y="35" font-size="10" text-anchor="middle" fill="#1a1008" font-weight="bold">50%</text>

    <!-- 100% Full Glow -->
    <defs>
      <filter id="cell-glow">
        <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#f59e0b" flood-opacity="0.8"/>
      </filter>
    </defs>
    <polygon points="180,10 200,20 200,40 180,50 160,40 160,20"
             fill="#f59e0b"
             stroke="#d97706"
             stroke-width="2"
             filter="url(#cell-glow)"/>
    <text x="180" y="35" font-size="10" text-anchor="middle" fill="#1a1008" font-weight="bold">100%</text>
  </g>

</svg>
