<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <!-- ========== WOOD GRAIN PATTERNS ========== -->

    <!-- Wood Grain - Light -->
    <pattern id="wood-grain-light" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="#8b5a3c"/>
      <line x1="0" y1="5" x2="100" y2="5" stroke="#9b6a4c" stroke-width="1" opacity="0.4"/>
      <line x1="0" y1="12" x2="100" y2="12" stroke="#7b4a2c" stroke-width="0.8" opacity="0.5"/>
      <line x1="0" y1="20" x2="100" y2="20" stroke="#6b3d26" stroke-width="1.2" opacity="0.6"/>
      <line x1="0" y1="28" x2="100" y2="28" stroke="#8b5a3c" stroke-width="0.8" opacity="0.4"/>
      <line x1="0" y1="35" x2="100" y2="35" stroke="#5a3220" stroke-width="1" opacity="0.5"/>
      <line x1="0" y1="45" x2="100" y2="45" stroke="#9b6a4c" stroke-width="0.9" opacity="0.35"/>
      <line x1="0" y1="55" x2="100" y2="55" stroke="#7b4a2c" stroke-width="1.1" opacity="0.45"/>
      <line x1="0" y1="65" x2="100" y2="65" stroke="#6b3d26" stroke-width="1" opacity="0.55"/>
      <line x1="0" y1="75" x2="100" y2="75" stroke="#8b5a3c" stroke-width="0.8" opacity="0.4"/>
      <line x1="0" y1="85" x2="100" y2="85" stroke="#5a3220" stroke-width="1.2" opacity="0.6"/>
      <line x1="0" y1="95" x2="100" y2="95" stroke="#9b6a4c" stroke-width="0.8" opacity="0.35"/>
    </pattern>

    <!-- Wood Grain - Dark -->
    <pattern id="wood-grain-dark" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="#6b4423"/>
      <line x1="0" y1="3" x2="100" y2="3" stroke="#7b5433" stroke-width="0.8" opacity="0.5"/>
      <line x1="0" y1="10" x2="100" y2="10" stroke="#5b3413" stroke-width="1" opacity="0.6"/>
      <line x1="0" y1="18" x2="100" y2="18" stroke="#4b2413" stroke-width="1.2" opacity="0.7"/>
      <line x1="0" y1="25" x2="100" y2="25" stroke="#6b4423" stroke-width="0.8" opacity="0.5"/>
      <line x1="0" y1="33" x2="100" y2="33" stroke="#8b6433" stroke-width="1" opacity="0.4"/>
      <line x1="0" y1="42" x2="100" y2="42" stroke="#5b3413" stroke-width="0.9" opacity="0.55"/>
      <line x1="0" y1="52" x2="100" y2="52" stroke="#7b5433" stroke-width="1.1" opacity="0.5"/>
      <line x1="0" y1="62" x2="100" y2="62" stroke="#4b2413" stroke-width="1" opacity="0.65"/>
      <line x1="0" y1="72" x2="100" y2="72" stroke="#6b4423" stroke-width="0.8" opacity="0.5"/>
      <line x1="0" y1="82" x2="100" y2="82" stroke="#8b6433" stroke-width="1.2" opacity="0.45"/>
      <line x1="0" y1="92" x2="100" y2="92" stroke="#5b3413" stroke-width="0.8" opacity="0.6"/>
    </pattern>

    <!-- ========== HONEYCOMB PATTERN ========== -->

    <pattern id="honeycomb-grid" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <g stroke="#f59e0b" stroke-width="1" fill="none" opacity="0.1">
        <!-- Horizontal rows of hexagons -->
        <polygon points="40,5 70,20 70,50 40,65 10,50 10,20"/>
        <polygon points="40,85 70,100 70,130 40,145 10,130 10,100"/>
      </g>
    </pattern>

    <!-- ========== GRADIENTS ========== -->

    <!-- Amber Glow - Radial -->
    <radialGradient id="gradient-amber-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.8" />
      <stop offset="60%" style="stop-color:#d97706;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0" />
    </radialGradient>

    <!-- Gold Glow - Radial (stronger) -->
    <radialGradient id="gradient-gold-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0.1" />
    </radialGradient>

    <!-- Green Glow -->
    <radialGradient id="gradient-green-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.8" />
      <stop offset="60%" style="stop-color:#059669;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0" />
    </radialGradient>

    <!-- Red Glow -->
    <radialGradient id="gradient-red-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:0.8" />
      <stop offset="60%" style="stop-color:#b91c1c;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#b91c1c;stop-opacity:0" />
    </radialGradient>

    <!-- Honey Liquid - Linear -->
    <linearGradient id="gradient-honey-liquid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.9" />
      <stop offset="40%" style="stop-color:#f59e0b;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0.6" />
    </linearGradient>

    <!-- Hexagon Default (Brown) -->
    <linearGradient id="gradient-hex-default" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5a3c;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6b4423;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a2f1a;stop-opacity:1" />
    </linearGradient>

    <!-- Hexagon Hover (Amber) -->
    <linearGradient id="gradient-hex-hover" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d97706;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b45309;stop-opacity:1" />
    </linearGradient>

    <!-- Hexagon Correct (Green) -->
    <linearGradient id="gradient-hex-correct" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>

    <!-- Hexagon Wrong (Red) -->
    <linearGradient id="gradient-hex-wrong" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#b91c1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7f1d1d;stop-opacity:1" />
    </linearGradient>

    <!-- ========== FILTERS ========== -->

    <filter id="filter-drop-shadow-default">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-opacity="0.5"/>
    </filter>

    <filter id="filter-drop-shadow-deep">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.7"/>
    </filter>

    <filter id="filter-glow-amber">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#f59e0b" flood-opacity="0.7"/>
    </filter>

    <filter id="filter-glow-green">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#10b981" flood-opacity="0.8"/>
    </filter>

    <filter id="filter-glow-red">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#dc2626" flood-opacity="0.8"/>
    </filter>

    <filter id="filter-glow-gold">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#fbbf24" flood-opacity="0.9"/>
    </filter>
  </defs>

  <!-- ========== PATTERN SAMPLES ========== -->

  <!-- Wood Grain Light Sample -->
  <rect x="10" y="10" width="120" height="120" fill="url(#wood-grain-light)" stroke="#4a2815" stroke-width="2"/>
  <text x="70" y="200" font-size="12" text-anchor="middle" fill="#f59e0b" font-weight="bold">Wood Grain Light</text>

  <!-- Wood Grain Dark Sample -->
  <rect x="150" y="10" width="120" height="120" fill="url(#wood-grain-dark)" stroke="#2a1810" stroke-width="2"/>
  <text x="210" y="200" font-size="12" text-anchor="middle" fill="#f59e0b" font-weight="bold">Wood Grain Dark</text>

  <!-- Honeycomb Pattern Sample -->
  <rect x="290" y="10" width="120" height="120" fill="#1a1008" stroke="#4a2815" stroke-width="2"/>
  <rect x="290" y="10" width="120" height="120" fill="url(#honeycomb-grid)"/>
  <text x="350" y="200" font-size="12" text-anchor="middle" fill="#f59e0b" font-weight="bold">Honeycomb Grid</text>

  <!-- ========== GRADIENT SAMPLES ========== -->

  <!-- Amber Glow -->
  <circle cx="70" cy="280" r="40" fill="url(#gradient-amber-glow)"/>
  <text x="70" y="370" font-size="12" text-anchor="middle" fill="#f59e0b" font-weight="bold">Amber Glow</text>

  <!-- Gold Glow -->
  <circle cx="210" cy="280" r="40" fill="url(#gradient-gold-glow)"/>
  <text x="210" y="370" font-size="12" text-anchor="middle" fill="#f59e0b" font-weight="bold">Gold Glow</text>

  <!-- Green Glow -->
  <circle cx="350" cy="280" r="40" fill="url(#gradient-green-glow)"/>
  <text x="350" y="370" font-size="12" text-anchor="middle" fill="#10b981" font-weight="bold">Green Glow</text>

  <!-- Honey Liquid Bar -->
  <rect x="10" y="400" width="280" height="60" fill="url(#gradient-honey-liquid)" stroke="#d97706" stroke-width="2" rx="4"/>
  <text x="150" y="440" font-size="12" text-anchor="middle" fill="#1a1008" font-weight="bold">Honey Liquid Gradient</text>

  <!-- Hex Gradients Row -->
  <!-- Default -->
  <polygon points="70,520 110,545 110,595 70,620 30,595 30,545"
           fill="url(#gradient-hex-default)"
           stroke="#4a2815"
           stroke-width="2"/>
  <text x="70" y="570" font-size="10" text-anchor="middle" fill="#f59e0b" font-weight="bold">Def</text>

  <!-- Hover -->
  <polygon points="210,520 250,545 250,595 210,620 170,595 170,545"
           fill="url(#gradient-hex-hover)"
           stroke="#d97706"
           stroke-width="2"/>
  <text x="210" y="570" font-size="10" text-anchor="middle" fill="#1a1008" font-weight="bold">Hvr</text>

  <!-- Correct -->
  <polygon points="350,520 390,545 390,595 350,620 310,595 310,545"
           fill="url(#gradient-hex-correct)"
           stroke="#059669"
           stroke-width="2"/>
  <text x="350" y="570" font-size="10" text-anchor="middle" fill="#fff" font-weight="bold">✓</text>

</svg>
